<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>ORACLE TAROT PRO - MASTERPIECE</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icon/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <style>
    :root { 
        --gold: #D4AF37; --bright-gold: #FFF5C3; --dark-gold: #8C6212; --bg: #000000; --text: #ffffff;
        --font: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    }    
    body { 
        margin: 0; padding: 0; 
        background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        color: var(--text); font-family: var(--font); 
        display: flex; justify-content: center; 
        min-height: 100vh; height: auto; overflow-y: auto; 
        transition: background 2.5s ease-in-out;
        overflow-x: hidden;
    }

    #app-container { 
        width: 100%; max-width: 500px; 
        display: flex; flex-direction: column; align-items: center; 
        text-align: center; 
        padding: 95px 25px 120px 25px; 
        box-sizing: border-box;
        height: auto; min-height: 100vh; position: relative;
        border-left: 1px solid rgba(212, 175, 55, 0.15);
        border-right: 1px solid rgba(212, 175, 55, 0.15);
    }

    #app-container::before, #app-container::after {
        content: "✨"; position: absolute; font-size: 1.2rem; color: var(--gold); opacity: 0.7;
    }
    #app-container::before { top: 100px; left: 35px; } 
    #app-container::after { top: 100px; right: 35px; }

    .gold-title { color: var(--gold); letter-spacing: 0.3em; font-size: 2.3rem; margin-top: 0; margin-bottom: 5px; font-weight: 900; text-shadow: 0 0 15px rgba(212,175,55,0.6); }
    .sub-title { color: var(--gold); font-size: 0.95rem; letter-spacing: 0.5em; margin-bottom: 75px; display: block; font-weight: 800; }

    .input-system-wrapper { 
        position: relative; width: 100%; max-width: 400px; 
        height: 115px; 
        margin: 0 auto; display: flex; align-items: center; justify-content: center; 
    }
    .beveled-border { 
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background: linear-gradient(145deg, #FFF5C3, var(--gold), var(--dark-gold)); 
        clip-path: polygon(15px 0%, calc(100% - 15px) 0%, 100% 15px, 100% calc(100% - 15px), calc(100% - 15px) 100%, 15px 100%, 0% calc(100% - 15px), 0% 15px); 
        z-index: 1; pointer-events: none; animation: borderPulse 3s infinite ease-in-out; 
    }
    .beveled-inner { 
        position: absolute; width: calc(100% - 6px); height: calc(100% - 6px); top: 3px; left: 3px;
        background: linear-gradient(135deg, #2D0054, #120022); 
        clip-path: polygon(14px 0%, calc(100% - 14px) 0%, 100% 14px, 100% calc(100% - 14px), calc(100% - 14px) 100%, 14px 100%, 0% calc(100% - 14px), 0% 14px); 
        box-shadow: 0 0 20px rgba(191, 90, 242, 0.4); z-index: 2; 
    }
    
    .gold-input { 
        position: relative; z-index: 10; background: transparent; border: none; outline: none; 
        color: #ffffff; font-size: 1rem; width: 88%; font-weight: bold; text-align: center;
        font-family: var(--font); resize: none; line-height: 1.7; padding: 10px 0;
        overflow: hidden;
    }

    #fake-placeholder {
        position: absolute; z-index: 5; width: 100%; 
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        pointer-events: none; transition: 0.3s;
    }
    @keyframes borderPulse { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.01); } }

    .intuition-text { 
        color: var(--bright-gold); font-size: 0.7rem; font-style: italic; letter-spacing: 0.25em; 
        margin: 25px 0 60px 0; text-transform: uppercase; font-weight: 800; 
        text-shadow: 0 0 8px rgba(212, 175, 55, 0.5); 
    }

    .button-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto; }
    .spiritual-pointer { 
        position: absolute; bottom: -30px; right: -20px; 
        font-size: 1.8rem; z-index: 10; 
        transform: rotate(150deg); animation: handMove 1.1s infinite ease-in-out; 
        filter: drop-shadow(0 0 10px var(--gold)); 
    }
    @keyframes handMove { 0%, 100% { transform: translateY(0) rotate(150deg); } 50% { transform: translateY(-12px) rotate(150deg); } }

    .gold-button { 
        background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%); color: #000; border: none; 
        padding: 18px 0; width: 100%; border-radius: 50px; font-weight: 900; cursor: pointer; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
        box-shadow: 0 10px 40px rgba(212,175,55,0.4);
    }
    .btn-ko { font-size: 1.4rem; letter-spacing: 0.05em; line-height: 1.2; }
    .btn-en { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.15em; opacity: 1; text-transform: uppercase; }

    .legal-notice { 
        width: 85%; max-width: 400px; margin: 80px auto 20px auto; 
        font-size: 0.7rem; color: var(--gold); line-height: 1.8; text-align: center; 
        border-top: 1.5px solid rgba(212, 175, 55, 0.3); padding-top: 25px; 
        font-weight: 700; text-shadow: 1px 1px 2px #000;
        word-break: keep-all;
    }

    #result-view { display: none; width: 100%; flex-direction: column; align-items: center; }
    .category-bar { color: var(--gold); font-size: 1.1rem; border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 15px 0; margin: 20px 0 20px 0; width: 100%; font-weight: bold; }
    #rev-guide { 
        display: none; background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); border-radius: 12px; 
        padding: 15px; margin: 0 0 25px 0; color: var(--bright-gold); font-size: 0.85rem; 
        line-height: 1.7; text-align: left; word-break: keep-all; font-weight: 600;
    }
    .card-item { width: 100%; max-width: 450px; opacity: 0; transform: translateY(50px); transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1); margin-bottom: 25px; }
    .card-show { opacity: 1; transform: translateY(0); filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2)); }
    .tarot-card.upside-down { transform: rotate(180deg); filter: sepia(0.4) brightness(0.7); }
    .rev-badge { background: rgba(255, 68, 68, 0.15); color: #ff4444; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-left: 8px; border: 1px solid rgba(255, 68, 68, 0.3); vertical-align: middle; }
    .btn-home { background: rgba(212,175,55,0.2); border: 2px solid var(--gold); color: var(--gold); padding: 12px 50px; border-radius: 50px; cursor: pointer; margin: 40px 0; display: none; flex-direction: column; align-items: center; gap: 4px; font-weight: 800; opacity: 0; transition: 0.5s; }
    .particle { position: fixed; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; box-shadow: 0 0 10px var(--gold); }
    .transition-card { position: fixed; top: 50%; left: 50%; width: 100px; height: 160px; background: linear-gradient(135deg, var(--dark-gold), var(--gold)); border: 2px solid #fff; border-radius: 10px; transform: translate(-50%, -50%); z-index: 10000; opacity: 0; }
    @keyframes whirlAndAway { 0% { transform: translate(-50%, -50%) rotateY(0deg) scale(0.5); opacity: 0; } 20% { opacity: 1; transform: translate(-50%, -50%) rotateY(720deg) scale(1.2); } 100% { transform: translate(-50%, -150%) rotateY(1440deg) scale(0); opacity: 0; } }
    .animate-whirl { animation: whirlAndAway 1.5s ease-in-out forwards; }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false">
    <div id="app-container">
        <div id="home-view">
            <h1 class="gold-title">ORACLE TAROT PRO</h1>
            <span class="sub-title">THE MASTERPIECE</span>
            
            <div class="input-system-wrapper">
                <div class="beveled-border"></div>
                <div class="beveled-inner"></div>
                <div id="fake-placeholder">
                    <div style="color: var(--gold); font-size: 1rem; font-weight: 900; text-shadow: 0 0 8px rgba(212,175,55,0.4);">마음의 질문을 깊게 새기소서</div>
                    <div style="color: rgba(255,255,255,0.5); font-size: 0.7rem; font-weight: 700;">(입력 후 아래 신탁확인 버튼을 누르세요)</div>
                </div>
                <textarea id="seed-input" class="gold-input" oninput="document.getElementById('fake-placeholder').style.opacity = this.value ? '0' : '1';" autocomplete="off"></textarea>
            </div>

            <div class="intuition-text">Trust your spiritual flow</div>
            <div class="button-container">
                <button class="gold-button" onclick="reveal()">
                    <span class="btn-ko">운명의 신탁 확인</span>
                    <span class="btn-en">REVEAL YOUR FATE</span>
                </button>
                <div class="spiritual-pointer" id="pointer-hand">👇</div>
            </div>
            <div class="legal-notice">
                본 결과는 <b>타로와 주역의 인문학적</b> 해석을 바탕으로 한<br><strong>참고용 콘텐츠</strong>입니다.<br>
                모든 선택과 결정의 책임은 <strong>사용자 본인</strong>에게 있습니다.
            </div>
        </div>

        <div id="result-view">
            <h1 class="gold-title" style="margin-top:10px; font-size:1.8rem;">ORACLE TAROT PRO</h1>
            <div id="category-display" class="category-bar"></div>
            <div id="rev-guide">🔮 <strong>영성적 안내:</strong> 역방향(REV)은 에너지가 정체되거나 반전된 상태를 의미하며, 경고가 아닌 '내면의 성찰'을 촉구하는 우주의 섬세한 조언입니다.</div>
            <div id="card-list" style="width:100%;"></div>
            <button id="home-btn" class="btn-home" onclick="location.reload()">
                <span class="btn-ko">새로운 운명 확인</span>
                <span class="btn-en">NEW DESTINY</span>
            </button>
        </div>
    </div>

    <script src="./data_ko.js/data_ko.js"></script>

    <script>
        // 1. [보안 및 F12 대응]
        (function() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('selectstart', e => e.preventDefault());
            document.addEventListener('keydown', function(e) {
                if (e.keyCode === 123) return true; 
                if ((e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 67 || e.keyCode === 86))) {
                    e.preventDefault(); return false;
                }
            });
        })();

        // [교정] 2. 데이터 영역: 외부 파일에서 데이터를 안전하게 가져옵니다.
        const rawData = window.rawData_KO || "";

        // 3. [유틸리티 함수]
        function createGoldDust() {
            const hand = document.getElementById('pointer-hand');
            if (!hand || document.getElementById('home-view').style.display === 'none') return;
            const dust = document.createElement('div');
            const rect = hand.getBoundingClientRect();
            const size = Math.random() * 3 + 1;
            dust.style.width = size + 'px'; dust.style.height = size + 'px';
            dust.style.left = (rect.left + rect.width / 2 + (Math.random() - 0.5) * 30) + 'px';
            dust.style.top = (rect.top + (Math.random() - 0.5) * 30) + 'px';
            dust.style.position = 'fixed'; dust.style.background = 'var(--bright-gold)';
            dust.style.borderRadius = '50%'; dust.style.pointerEvents = 'none'; dust.style.zIndex = '9';
            dust.style.boxShadow = '0 0 5px var(--gold)';
            document.body.appendChild(dust);
            const angle = Math.random() * Math.PI * 2;
            dust.animate([{ opacity: 1, transform: 'scale(1)' }, { opacity: 0, transform: `translate(${Math.cos(angle)*40}px, ${Math.sin(angle)*40}px) scale(0)` }], { duration: 1500 }).onfinish = () => dust.remove();
        }
        setInterval(createGoldDust, 80);

        function createParticle() {
            const p = document.createElement('div'); p.className = 'particle';
            const x = window.innerWidth / 2, y = window.innerHeight / 2;
            p.style.left = x + 'px'; p.style.top = y + 'px';
            document.body.appendChild(p);
            const angle = Math.random() * Math.PI * 2, velocity = 400 + Math.random() * 600;
            const destX = Math.cos(angle) * velocity, destY = Math.sin(angle) * velocity;
            p.animate([{ transform: 'translate(-50%, -50%) scale(1.8)', opacity: 1 }, { transform: `translate(${destX}px, ${destY}px) scale(0)`, opacity: 0 }], { duration: 1500, easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)', fill: 'forwards' });
            setTimeout(() => p.remove(), 2000);
        }

        function typeWriter(element, text, speed, callback) {
            let i = 0; element.innerHTML = "";
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i++);
                    const rect = element.closest('.card-item').getBoundingClientRect();
                    if (rect.bottom > window.innerHeight - 100) {
                        window.scrollBy({ top: 25, behavior: 'smooth' });
                    }
                    setTimeout(type, speed);
                } else if (callback) callback();
            }
            type();
        }

        // [교정된 함수] 대소문자 및 경로 문제를 해결합니다.
function mapKeyToFileName(cardKey) {
    try {
        const key = cardKey.trim().toUpperCase(); // M00 형태
        let num = "";
        
        if (key.startsWith('M')) {
            // M01 -> 01 추출
            num = key.replace(/[^0-9]/g, "").padStart(2, '0');
        } else {
            // 마이너 카드 계산 로직
            let s = key.substring(0, 1), v = parseInt(key.substring(1));
            let b = (s === 'C') ? 22 : (s === 'S') ? 36 : (s === 'P') ? 50 : 64;
            num = (b + v - 1).toString().padStart(2, '0');
        }

         return "images/cards/m" + num + ".jpg"; 
    } catch (e) { 
        return "images/cards/m00.jpg"; 
    }
}

        // 4. [메인 로직]
        function reveal() {
            const seedInput = document.getElementById('seed-input');
            const seed = seedInput ? seedInput.value.trim() : "";
            if (!seed) { alert("상담 내용을 입력해주세요."); return; }

            for (let i = 0; i < 150; i++) setTimeout(createParticle, i * 3);
            const tCard = document.createElement('div'); tCard.className = 'transition-card animate-whirl';
            document.body.appendChild(tCard);

            const homeView = document.getElementById('home-view');
            homeView.style.transition = "0.8s"; homeView.style.opacity = "0";

            setTimeout(() => {
                tCard.remove(); homeView.style.display = 'none';
                document.getElementById('result-view').style.display = 'flex';
                document.getElementById('category-display').innerText = "✨ 영성적 서사 : 6인의 신탁 가이드 ✨";
                document.getElementById('rev-guide').style.display = 'block';

                const allLines = rawData.trim().split('\n').filter(line => line.includes(';'));
                const shuffled = allLines.sort(() => 0.5 - Math.random()).slice(0, 6);
                const cardList = document.getElementById('card-list'); cardList.innerHTML = '';
                
                function renderCard(index) {
                    if (index >= shuffled.length) {
                        const btn = document.getElementById('home-btn'); btn.style.display = "flex";
                        setTimeout(() => { btn.style.opacity = "1"; btn.scrollIntoView({ behavior: 'smooth' }); }, 500);
                        return;
                    }

                    const data = shuffled[index].split(';');
                    const cardId = data[0].trim();
                    const isRev = Math.random() > 0.5;
                    const hashtag = data[3];
                    const fullOracle = `${data[4]} ${data[5]} ${data[6]}`;

                    let stepTitle = "";
                    let stepColor = "var(--gold)";
                    let isFinal = (index === 5);

                    if (index < 2) stepTitle = `<span style="font-size:0.8rem; opacity:0.8;">📜 [과거]</span><br>형성된 흐름 #${index + 1}`;
                    else if (index < 4) { stepTitle = `<span style="font-size:0.8rem; opacity:0.8;">✨ [현재]</span><br>직면한 에너지 #${index + 1}`; stepColor = "#00ffcc"; }
                    else if (index === 4) { stepTitle = `<span style="font-size:0.8rem; opacity:0.8;">🔮 [미래]</span><br>도달할 방향`; stepColor = "var(--bright-gold)"; }
                    else { 
                        stepTitle = `<span style="font-size:0.85rem; opacity:0.9;">👑 [최종 신탁]</span><br><span style="font-size:1.2rem; display:block; margin-top:4px; letter-spacing:0.05em;">운명의 해답</span>`; 
                        stepColor = "#FFD700"; 
                    }

                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'card-item';
                    const finalStyle = isFinal ? `border:3px solid #FFD700; box-shadow: 0 0 35px rgba(255,215,0,0.4); transform: scale(1.05);` : `border:1px solid ${stepColor};`;
                    
                    cardDiv.innerHTML = `
                        <div style="padding:22px; background:rgba(15,15,15,0.98); border-radius:15px; text-align:left; ${finalStyle}">
                            <div style="display:flex; gap:18px; align-items:flex-start; margin-bottom:15px;">
                                <div style="flex:0 0 70px; height:110px; border-radius:8px; overflow:hidden; border: 1px solid ${isFinal ? '#FFD700' : stepColor};">
                                    <img src="${mapKeyToFileName(cardId)}" class="${isRev ? 'tarot-card upside-down' : ''}" style="width:100%; height:100%; object-fit:cover;">
                                </div>
                                <div style="flex:1;">
                                    <div style="line-height:1.3;">
                                        <div style="color:${isFinal ? '#FFD700' : stepColor}; font-weight:900;">${stepTitle}</div>
                                        ${isRev ? `<div style="margin-top:8px;"><span class="rev-badge" style="background:rgba(255,0,0,0.2); color:#ff4d4d; border:1px solid #ff4d4d; font-size:0.75rem; padding:2px 6px; border-radius:4px; font-weight:900;">REV 🔄</span></div>` : ""}
                                    </div>
                                    <div style="color:var(--bright-gold); font-size:0.85rem; font-weight:700; margin-top:10px;">${hashtag}</div>
                                </div>
                            </div>
                            <div id="text-${index}" style="color:#eee; font-size:1rem; line-height:1.8; word-break:keep-all; min-height:80px;"></div>
                        </div>`;
                    
                    cardList.appendChild(cardDiv);
                    
                    setTimeout(() => {
                        cardDiv.classList.add('card-show');
                        cardDiv.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
                        
                        setTimeout(() => {
                            const target = document.getElementById("text-" + index);
                            typeWriter(target, fullOracle, isFinal ? 45 : 30, () => {
                                setTimeout(() => renderCard(index + 1), 1200);
                            });
                        }, 800);
                    }, 100);
                }
                renderCard(0);
            }, 1500);
        }
    </script>
</body>
</html>
